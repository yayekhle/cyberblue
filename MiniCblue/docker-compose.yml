# =============================================================================
# CyberBlue - Lightweight SOC Blue Team Stack
# =============================================================================
# Dropped services vs default:
#   - Shuffle       (SOAR - shelfware for small teams, TheHive+Cortex covers it)
#   - FleetDM       (Endpoint - overlaps with Velociraptor, 3 containers for one tool)
#   - MITRE Nav     (Reference tool only - use the online version)
#   - CyberChef     (Static app - use gchq.github.io/CyberChef instead)
#   - Wireshark     (Redundant - Arkime does full PCAP better, also ran privileged)
#
# Kept services:
#   - Portal        (Dashboard UI for the whole stack)
#   - Portainer     (Docker management)
#   - Wazuh         (SIEM backbone - manager + indexer + dashboard)
#   - Velociraptor  (Live endpoint forensics - DFIR)
#   - MISP          (Threat intel platform)
#   - TheHive       (Case management)
#   - Cortex        (Automated enrichment for TheHive)
#   - Suricata      (IDS - network intrusion detection)
#   - EveBox        (Suricata alert viewer)
#   - Arkime        (Full PCAP capture + session search)
#   - Caldera       (Adversary emulation - red/blue team training)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PORTAL — CyberBlue web dashboard (the card grid UI)
  # Mounts docker.sock to read live container status
  # Removed: ./fleet/agents volume mount (FleetDM gone)
  # ---------------------------------------------------------------------------
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: cyber-blue-portal
    ports:
      - "5500:5500"   # HTTP
      - "5443:5443"   # HTTPS
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portal/logs:/app/logs
      - ./portal/ssl:/app/ssl:ro
      - ./velociraptor:/velociraptor
      - ./wazuh/agents:/wazuh/agents
      - /opt/yara-rules:/opt/yara-rules
      - /opt/sigma-rules:/opt/sigma-rules
      - /var/log:/var/log
    environment:
      - PORT=5500
      - HTTPS_PORT=5443
      - FLASK_ENV=production
      - HOST_IP=${HOST_IP:-127.0.0.1}
      - CYBERBLUE_INSTALL_DIR=${CYBERBLUE_INSTALL_DIR:-/home/ubuntu/CyberBlue}
      - CYBERBLUE_INSTALL_USER=${CYBERBLUE_INSTALL_USER:-ubuntu}
      - ENABLE_HTTPS=true
      - SSL_CERT_PATH=/app/ssl/cert.pem
      - SSL_KEY_PATH=/app/ssl/key.pem
      - SECRET_KEY=cyberblue-secure-secret-key-change-in-production
      - ADMIN_PASSWORD=cyberblue123
    restart: unless-stopped
    networks:
      - cyber-blue

  # ---------------------------------------------------------------------------
  # PORTAINER — Docker container management UI
  # Useful for managing 10 containers without CLI
  # ---------------------------------------------------------------------------
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    ports:
      - "9443:9443"   # HTTPS UI
      - "8001:8000"   # Agent port
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - cyber-blue

  # ===========================================================================
  # WAZUH — SIEM (3 containers: manager + indexer + dashboard)
  # The backbone of the SOC. Eats ~4-6GB RAM alone due to OpenSearch indexer.
  # Certs are generated once by the generator init container then it exits.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Wazuh Cert Generator — runs once at install, generates TLS certs, then exits
  # ---------------------------------------------------------------------------
  generator:
    image: wazuh/wazuh-certs-generator:0.0.2
    container_name: wazuh-cert-generator
    hostname: wazuh-certs-generator
    command: generate-indexer-certs
    restart: "no"   # One-shot, exits after cert generation
    volumes:
      - ./wazuh/config/certs.yml:/config/certs.yml
      - ./wazuh/config/wazuh_indexer_ssl_certs/:/certificates/
    networks:
      - cyber-blue

  # ---------------------------------------------------------------------------
  # Wazuh Manager — the core engine: agent mgmt, rules, decoders, active response
  # ---------------------------------------------------------------------------
  wazuh.manager:
    image: wazuh/wazuh-manager:4.12.0
    container_name: wazuh-manager
    hostname: wazuh.manager
    restart: always
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      - "1514:1514"       # Agent UDP/TCP communication
      - "1515:1515"       # Agent enrollment
      - "514:514/udp"     # Syslog ingestion
      - "55000:55000"     # REST API
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./wazuh/config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key
      - ./wazuh/config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf
    depends_on:
      generator:
        condition: service_completed_successfully
    networks:
      - cyber-blue

  # ---------------------------------------------------------------------------
  # Wazuh Indexer — OpenSearch node that stores all Wazuh alerts and logs
  # This is your biggest RAM consumer: set -Xms1g -Xmx1g to cap it
  # ---------------------------------------------------------------------------
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.12.0
    container_name: wazuh-indexer
    hostname: wazuh.indexer
    restart: always
    ports:
      - "9200:9200"   # OpenSearch API (used by manager + dashboard)
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"   # Cap at 1GB — increase if you have RAM to spare
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./wazuh/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.key
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/certs/wazuh.indexer.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem
      - ./wazuh/config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/opensearch.yml
      - ./wazuh/config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml
    depends_on:
      generator:
        condition: service_completed_successfully
    networks:
      - cyber-blue

  # ---------------------------------------------------------------------------
  # Wazuh Dashboard — Kibana-style UI for browsing alerts, agents, rules
  # Credentials: admin / SecretPassword
  # ---------------------------------------------------------------------------
  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.12.0
    container_name: wazuh-dashboard
    hostname: wazuh.dashboard
    restart: always
    ports:
      - "7001:5601"   # Web UI
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ./wazuh/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ./wazuh/config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ./wazuh/config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      wazuh.indexer:
        condition: service_started
      wazuh.manager:
        condition: service_started
      generator:
        condition: service_completed_successfully
    links:
      - wazuh.indexer:wazuh.indexer
      - wazuh.manager:wazuh.manager
    networks:
      - cyber-blue

  # ===========================================================================
  # VELOCIRAPTOR — DFIR / Live Endpoint Forensics
  # Hunt across endpoints, collect artifacts, triage incidents in real-time.
  # Credentials set via VEL_USER / VEL_PASSWORD in .env
  # ===========================================================================
  velociraptor:
    build: ./velociraptor
    container_name: velociraptor
    ports:
      - "7000:8889"   # Web GUI
      - "8000:8000"   # Agent communication (Frontend port)
    volumes:
      - ./velociraptor:/velociraptor
    restart: unless-stopped
    environment:
      - VEL_USER=${VEL_USER}
      - VEL_PASSWORD=${VEL_PASSWORD}
      - HOST_IP=${HOST_IP:-127.0.0.1}
    networks:
      - cyber-blue

  # ===========================================================================
  # MISP — Threat Intelligence Platform
  # Shares and correlates IOCs. Requires redis + mariadb + misp-modules.
  # Default login: admin@admin.test / admin  (change immediately!)
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # MISP Mail relay — needed for notifications and user invites
  # Uses ixdotai/smtp which supports Gmail, SES, or generic SMTP
  # Leave SMARTHOST_* vars empty in .env if you don't need email
  # ---------------------------------------------------------------------------
  mail:
    image: ixdotai/smtp
    container_name: misp-mail
    restart: unless-stopped
    environment:
      - "SMARTHOST_ADDRESS=${SMARTHOST_ADDRESS}"
      - "SMARTHOST_PORT=${SMARTHOST_PORT}"
      - "SMARTHOST_USER=${SMARTHOST_USER}"
      - "SMARTHOST_PASSWORD=${SMARTHOST_PASSWORD}"
      - "SMARTHOST_ALIASES=${SMARTHOST_ALIASES}"
    networks:
      - cyber-blue

  # ---------------------------------------------------------------------------
  # MISP Redis — session cache and background job queue for MISP
  # ---------------------------------------------------------------------------
  redis:
    image: valkey/valkey:7.2
    container_name: misp-redis
    restart: unless-stopped
    command: "--requirepass '${REDIS_PASSWORD:-redispassword}'"
    healthcheck:
      test: "valkey-cli -a '${REDIS_PASSWORD:-redispassword}' -p ${REDIS_PORT:-6379} ping | grep -q PONG || exit 1"
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 5s
    networks:
      - cyber-blue

  # ---------------------------------------------------------------------------
  # MISP Database — MariaDB stores all MISP events, attributes, and users
  # ARM-compatible. Tuned with InnoDB settings for performance.
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:10.11
    container_name: misp-db
    restart: always
    environment:
      - "MYSQL_USER=${MYSQL_USER:-misp}"
      - "MYSQL_PASSWORD=${MYSQL_PASSWORD:-example}"
      - "MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-password}"
      - "MYSQL_DATABASE=${MYSQL_DATABASE:-misp}"
    command: >
      --innodb-buffer-pool-size=${INNODB_BUFFER_POOL_SIZE:-2048M}
      --innodb-change-buffering=${INNODB_CHANGE_BUFFERING:-none}
      --innodb-io-capacity=${INNODB_IO_CAPACITY:-1000}
      --innodb-io-capacity-max=${INNODB_IO_CAPACITY_MAX:-2000}
      --innodb-log-file-size=${INNODB_LOG_FILE_SIZE:-600M}
      --innodb-read-io-threads=${INNODB_READ_IO_THREADS:-16}
      --innodb-stats-persistent=${INNODB_STATS_PERSISTENT:-ON}
      --innodb-write-io-threads=${INNODB_WRITE_IO_THREADS:-4}
    volumes:
      - mysql_data:/var/lib/mysql
    cap_add:
      - SYS_NICE   # Prevents runaway MySQL log spam
    healthcheck:
      test: mysqladmin --user=$$MYSQL_USER --password=$$MYSQL_PASSWORD status
      interval: 2s
      timeout: 1s
      retries: 3
      start_period: 30s
    networks:
      - cyber-blue

  # ---------------------------------------------------------------------------
  # MISP Core — the main PHP application
  # Depends on redis, db, and misp-modules all being healthy before starting
  # ---------------------------------------------------------------------------
  misp-core:
    image: ghcr.io/misp/misp-docker/misp-core:${CORE_RUNNING_TAG:-latest}
    container_name: misp-core
    cap_add:
      - AUDIT_WRITE
    build:
      context: misp/core/.
      args:
        - CORE_TAG=${CORE_TAG:?Missing .env file, see README.md for instructions}
        - CORE_COMMIT=${CORE_COMMIT}
        - CORE_FLAVOR=${CORE_FLAVOR:-full}
        - PHP_VER=${PHP_VER:?Missing .env file, see README.md for instructions}
        - PYPI_REDIS_VERSION=${PYPI_REDIS_VERSION}
        - PYPI_LIEF_VERSION=${PYPI_LIEF_VERSION}
        - PYPI_PYDEEP2_VERSION=${PYPI_PYDEEP2_VERSION}
        - PYPI_PYTHON_MAGIC_VERSION=${PYPI_PYTHON_MAGIC_VERSION}
        - PYPI_MISP_LIB_STIX2_VERSION=${PYPI_MISP_LIB_STIX2_VERSION}
        - PYPI_MAEC_VERSION=${PYPI_MAEC_VERSION}
        - PYPI_MIXBOX_VERSION=${PYPI_MIXBOX_VERSION}
        - PYPI_CYBOX_VERSION=${PYPI_CYBOX_VERSION}
        - PYPI_PYMISP_VERSION=${PYPI_PYMISP_VERSION}
        - PYPI_MISP_STIX_VERSION=${PYPI_MISP_STIX_VERSION}
        - PYPI_SETUPTOOLS=${PYPI_SETUPTOOLS}
        - PYPI_SUPERVISOR=${PYPI_SUPERVISOR}
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      misp-modules:
        condition: service_healthy
    healthcheck:
      # Use port 443 (nginx internal) not 7003 (host-mapped) — host ports are not
      # reachable inside the container itself.
      test: curl -ks https://localhost/users/heartbeat > /dev/null || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    ports:
      - "7003:443"    # MISP Web UI (HTTPS)
    volumes:
      - "./misp/configs/:/var/www/MISP/app/Config/"
      - "./misp/logs/:/var/www/MISP/app/tmp/logs/"
      - "./misp/files/:/var/www/MISP/app/files/"
      - "./misp/ssl/:/etc/nginx/certs/"
      - "./misp/gnupg/:/var/www/MISP/.gnupg/"
    environment:
      - "BASE_URL=https://${HOST_IP:-127.0.0.1}:7003"
      - "CRON_USER_ID=${CRON_USER_ID}"
      - "CRON_PULLALL=${CRON_PULLALL}"
      - "CRON_PUSHALL=${CRON_PUSHALL}"
      - "DISABLE_IPV6=${DISABLE_IPV6}"
      - "DISABLE_SSL_REDIRECT=${DISABLE_SSL_REDIRECT}"
      - "ENABLE_DB_SETTINGS=${ENABLE_DB_SETTINGS}"
      - "ENABLE_BACKGROUND_UPDATES=${ENABLE_BACKGROUND_UPDATES}"
      - "ENCRYPTION_KEY=${ENCRYPTION_KEY}"
      - "DISABLE_CA_REFRESH=${DISABLE_CA_REFRESH}"
      - "ADMIN_EMAIL=${ADMIN_EMAIL}"
      - "ADMIN_PASSWORD=${ADMIN_PASSWORD}"
      - "ADMIN_KEY=${ADMIN_KEY}"
      - "ADMIN_ORG=${ADMIN_ORG}"
      - "ADMIN_ORG_UUID=${ADMIN_ORG_UUID}"
      - "GPG_PASSPHRASE=${GPG_PASSPHRASE}"
      - "ATTACHMENTS_DIR=${ATTACHMENTS_DIR}"
      - "MYSQL_HOST=${MYSQL_HOST:-db}"
      - "MYSQL_PORT=${MYSQL_PORT:-3306}"
      - "MYSQL_USER=${MYSQL_USER:-misp}"
      - "MYSQL_PASSWORD=${MYSQL_PASSWORD:-example}"
      - "MYSQL_DATABASE=${MYSQL_DATABASE:-misp}"
      - "REDIS_HOST=${REDIS_HOST:-redis}"
      - "REDIS_PORT=${REDIS_PORT:-6379}"
      - "REDIS_PASSWORD=${REDIS_PASSWORD:-redispassword}"
      - "NGINX_CLIENT_MAX_BODY_SIZE=${NGINX_CLIENT_MAX_BODY_SIZE:-50M}"
      - "PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-2048M}"
      - "PHP_MAX_EXECUTION_TIME=${PHP_MAX_EXECUTION_TIME:-300}"
      - "PHP_UPLOAD_MAX_FILESIZE=${PHP_UPLOAD_MAX_FILESIZE:-50M}"
      - "PHP_POST_MAX_SIZE=${PHP_POST_MAX_SIZE:-50M}"
      - "PHP_MAX_INPUT_TIME:${PHP_MAX_INPUT_TIME:-300}"
      - "PHP_MAX_FILE_UPLOADS=${PHP_MAX_FILE_UPLOADS:-50}"
      - "PHP_FCGI_CHILDREN=${PHP_FCGI_CHILDREN:-5}"
      - "PHP_FCGI_START_SERVERS=${PHP_FCGI_START_SERVERS:-2}"
      - "PHP_FCGI_SPARE_SERVERS=${PHP_FCGI_SPARE_SERVERS:-1}"
      - "PHP_FCGI_MAX_REQUESTS=${PHP_FCGI_MAX_REQUESTS:-0}"
      - "PHP_SESSION_TIMEOUT=${PHP_SESSION_TIMEOUT:-60}"
      - "PHP_TIMEZONE=${PHP_TIMEZONE:-UTC}"
      - "SMTP_FQDN=${SMTP_FQDN}"
      - "DEBUG=${DEBUG}"
      - "PROXY_ENABLE=${PROXY_ENABLE}"
      - "PROXY_HOST=${PROXY_HOST}"
      - "PROXY_PORT=${PROXY_PORT}"
      - "PROXY_METHOD=${PROXY_METHOD}"
      - "PROXY_USER=${PROXY_USER}"
      - "PROXY_PASSWORD=${PROXY_PASSWORD}"
      - "SYNCSERVERS=${SYNCSERVERS}"
      - "HSTS_MAX_AGE=${HSTS_MAX_AGE}"
      - "X_FRAME_OPTIONS=${X_FRAME_OPTIONS}"
      - "CONTENT_SECURITY_POLICY=${CONTENT_SECURITY_POLICY}"
      - "FASTCGI_READ_TIMEOUT=${FASTCGI_READ_TIMEOUT:-300s}"
      - "FASTCGI_SEND_TIMEOUT=${FASTCGI_SEND_TIMEOUT:-300s}"
      - "FASTCGI_CONNECT_TIMEOUT=${FASTCGI_CONNECT_TIMEOUT:-300s}"
    restart: unless-stopped
    networks:
      - cyber-blue

  # ---------------------------------------------------------------------------
  # MISP Modules — enrichment & expansion modules (passive DNS, VirusTotal, etc.)
  # TheHive/Cortex can also query these modules for analysis
  # ---------------------------------------------------------------------------
  misp-modules:
    image: ghcr.io/misp/misp-docker/misp-modules:${MODULES_RUNNING_TAG:-latest}
    container_name: misp-modules
    build:
      context: misp/modules/.
      args:
        - MODULES_TAG=${MODULES_TAG:?Missing .env file, see README.md for instructions}
        - MODULES_COMMIT=${MODULES_COMMIT}
        - MODULES_FLAVOR=${MODULES_FLAVOR:-full}
    healthcheck:
      test: "/bin/bash -c '</dev/tcp/localhost/6666'"
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - "./misp/custom/action_mod/:/custom/action_mod/"
      - "./misp/custom/expansion/:/custom/expansion/"
      - "./misp/custom/export_mod/:/custom/export_mod/"
      - "./misp/custom/import_mod/:/custom/import_mod/"
    restart: unless-stopped
    networks:
      - cyber-blue

  # ===========================================================================
  # THEHIVE — Incident Response & Case Management
  # Where your analysts create cases, tasks, and track investigations
  # Default login: admin@thehive.local / secret
  # NOTE: The original compose has no persistence volume for TheHive —
  #       cases are lost on container restart. Consider adding a volume.
  # ===========================================================================
  thehive:
    image: strangebee/thehive:5.3.9-1
    container_name: thehive
    restart: unless-stopped
    ports:
      - "7005:9000"   # Web UI
    networks:
      - cyber-blue

  # ===========================================================================
  # ELASTICSEARCH — Backend for Cortex
  # Separate from Wazuh's OpenSearch. Cortex uses ES 7.x specifically.
  # NOTE: This is a second search engine running alongside Wazuh's indexer —
  #       unavoidable since Cortex requires Elasticsearch 7.x specifically.
  # ===========================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.10.2
    container_name: elasticsearch
    environment:
      - http.host=0.0.0.0
      - discovery.type=single-node
      - script.allowed_types=inline
      - thread_pool.search.queue_size=100000
      - thread_pool.write.queue_size=10000
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"   # Added: cap Elasticsearch RAM at 512MB
    restart: unless-stopped
    ports:
      - "9210:9200"   # ES API (offset from 9200 used by Wazuh)
      - "9300:9300"   # ES cluster communication
    networks:
      - cyber-blue

  # ===========================================================================
  # CORTEX — Automated Threat Analysis Engine
  # Runs analyzers (VirusTotal, Shodan, etc.) triggered from TheHive cases
  # Default login: admin / cyberblue123
  # Mounts docker.sock to spawn analyzer containers dynamically
  # ===========================================================================
  cortex:
    image: thehiveproject/cortex:latest
    container_name: cortex
    environment:
      - job_directory=${job_directory}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Needed to run analyzer containers
    depends_on:
      - elasticsearch
    restart: unless-stopped
    ports:
      - "0.0.0.0:7006:9001"   # Web UI
    networks:
      - cyber-blue

  # ===========================================================================
  # ARKIME — Full Packet Capture + Session Search
  # Stores raw PCAP and indexes sessions in OpenSearch (os01)
  # Needs a dedicated OpenSearch node — separate from Wazuh's indexer
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Arkime's OpenSearch node — stores packet metadata and session records
  # Separate from Wazuh's indexer to avoid index conflicts
  # ---------------------------------------------------------------------------
  os01:
    image: opensearchproject/opensearch:${OS_VERSION:-2.18.0}
    container_name: os01
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    environment:
      - node.name=os01
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms${OS_JAVA_MEM:-512m} -Xmx${OS_JAVA_MEM:-512m}"
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - discovery.type=single-node
    volumes:
      - os01_data:/usr/share/opensearch/data
    restart: unless-stopped
    networks:
      - cyber-blue

  # ---------------------------------------------------------------------------
  # Arkime — PCAP capture and search engine
  # Reads from PCAP_DIR (set in .env), stores sessions in os01
  # ---------------------------------------------------------------------------
  arkime:
    build:
      context: ./arkime
      dockerfile: Dockerfile
    container_name: arkime
    depends_on:
      - os01
    environment:
      - OS_HOST=os01
      - OS_PORT=9200
      - ARKIME_HOSTNAME=0.0.0.0
    ports:
      - "${ARKIME_PORT:-8005}:8005"  # Native Arkime port (configurable via .env)
      - "7008:8005"                   # CyberBlue portal standardized port
    volumes:
      - arkime_config:/data/config
      - arkime_logs:/data/logs
      - type: bind
        source: ${PCAP_DIR:-./arkime/pcaps}
        target: /data/pcap
    restart: unless-stopped
    networks:
      - cyber-blue

  # ===========================================================================
  # SURICATA — Network Intrusion Detection System (IDS)
  # Runs in host network mode to sniff live traffic on the host interface
  # Set SURICATA_INT in .env to your capture interface (e.g. eth0, ens3)
  # Writes eve.json logs consumed by EveBox
  # ===========================================================================
  suricata:
    image: stamus/suricata:latest
    container_name: suricata
    network_mode: "host"   # Must be host to capture real traffic — cannot use cyber-blue network
    volumes:
      - ./suricata:/etc/suricata
      - ./suricata/logs:/var/log/suricata
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - ./suricata/rules:/etc/suricata/rules
      - ./suricata/classification.config:/etc/suricata/classification.config
      - ./suricata/reference.config:/etc/suricata/reference.config
      - /etc/localtime:/etc/localtime:ro
    command: suricata -c /etc/suricata/suricata.yaml -i ${SURICATA_INT}
    restart: always
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true   # Required for packet capture

  # ===========================================================================
  # EVEBOX — Suricata Alert Viewer
  # Reads Suricata's eve.json and presents alerts in a searchable web UI
  # No auth by default — restrict access at the network level
  # ===========================================================================
  evebox:
    image: jasonish/evebox
    container_name: evebox
    command:
      - evebox
      - server
      - --no-auth
      - --datastore
      - sqlite
      - --input
      - /var/log/suricata/eve.json
    ports:
      - "7015:5636"   # Web UI
    volumes:
      - ./suricata/logs:/var/log/suricata:ro   # Read-only access to Suricata logs
    restart: always
    networks:
      - cyber-blue

  # ===========================================================================
  # CALDERA — MITRE Adversary Emulation Platform
  # Red/Blue team training: build and execute adversary TTPs
  # GUI on port 7009. Credentials in local.yml (admin/cyberblue)
  # ===========================================================================
  caldera:
    image: mitre/caldera:latest
    container_name: caldera
    ports:
      - "7009:8888"   # Web GUI
    volumes:
      - ./caldera/conf/local.yml:/usr/src/app/conf/local.yml:ro
      - caldera_data:/usr/src/app/data
    restart: unless-stopped
    networks:
      - cyber-blue

# =============================================================================
# VOLUMES
# Removed: fleet-mysql-data, fleet-server-data, yeti-exports, yeti-db
# (FleetDM and Yeti containers were removed)
# =============================================================================
volumes:
  # Wazuh
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:
  # MISP
  mysql_data:
  # Arkime
  arkime_config:
  arkime_logs:
  os01_data:
  # Portainer
  portainer_data:
  # Caldera
  caldera_data:

